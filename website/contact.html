<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Coffee Hut</title>

<link rel="stylesheet" href="css/contact.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="navbar">

<div class="logo">Coffee<span>Hut</span></div>

<nav class="navLinks">
<a href="home.html">Home</a>
<a href="menu.html">Menu</a>
<a href="rewards.html">Rewards</a>
<a href="find-store.html">Find Store</a>
<a href="contact.html">Contact</a>
</nav>

<a href="login.html" class="loginBtn">Sign In</a>

</header>


<!-- HERO -->

<section class="contactHero">

<h1>Contact Coffee Hut ☕</h1>

<p>We'd love to hear from you</p>

</section>


<!-- CONTACT INFO -->

<section class="contactInfo">

<div class="infoCard">

<i class="fa-solid fa-location-dot"></i>

<h3>Our Location</h3>

<p>Delhi, India</p>

</div>

<div class="infoCard">

<i class="fa-solid fa-phone"></i>

<h3>Phone</h3>

<p>+91 98765 43210</p>

</div>

<div class="infoCard">

<i class="fa-solid fa-envelope"></i>

<h3>Email</h3>

<p>coffeehut@gmail.com</p>

</div>

</section>


<!-- CONTACT FORM -->

<section class="contactForm">

<h2>Send us a Message</h2>

<form id="form">

<div class="inputBox">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Your Name" required>
</div>

<div class="inputBox">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Your Email" required>
</div>

<div class="inputBox">
<i class="fa-solid fa-comment"></i>
<textarea placeholder="Your Message" required></textarea>
</div>

<button class="btn">Send Message</button>

</form>

</section>


<footer>

<p>© 2026 Coffee Hut</p>

</footer>

<script src="js/contact.js"></script>

</body>
