<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="card">

<h2 id="title">Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="link" onclick="showSignup()">Create Account</p>
<p class="link" onclick="showForgot()">Forgot Password?</p>

</div>

<!-- SIGNUP -->

<div class="card hidden" id="signupBox">

<h2>Create Account</h2>

<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">

<button onclick="signup()">Create</button>

<p class="link" onclick="showLogin()">Back</p>

</div>

<!-- OTP -->

<div class="card hidden" id="otpBox">

<h2>Enter OTP</h2>

<input id="otpInput" placeholder="OTP">

<button onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- RESET -->

<div class="card hidden" id="resetBox">

<h2>New Password</h2>

<input id="resetPass" type="password" placeholder="New Password">

<button onclick="resetPassword()">Update Password</button>

</div>

<script src="js/login.js"></script>

</body>
</html>
